<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio | @nikegtag</title>
    <link rel="icon" type="image/webp" href="https://nikehub.org/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Parkinsans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div id="overlay" onclick="enterSite()">
        <div class="overlay-content">
            <p>click to enter...</p>
        </div>
    </div>

    <div class="video-bg">
        <video id="bgVideo" muted loop playsinline>
            <source src="/Minecraft03_compressed.mp4" type="video/mp4">
        </video>
    </div>

    <audio id="bgMusic" loop>
        <source src="dream.mp3" type="audio/mpeg">
    </audio>

    <div class="wrapper">
        <main class="card main-card">
            <div class="views"><i class="fa-solid fa-wifi"></i></i></div>
            <div class="avatar-container">
                <img src="/pfp.webp" alt="Avatar" class="main-avatar">
            </div>
            <h1 class="name">nikegtag</h1>
            <p class="description">
                front and backend web dev<br>
                skills: HTML, CSS, JS, Python, Lua, C#, JSON
            </p>
            <div class="main-socials">
                <a href="https://github.com/noseygames" target="_blank"><i class="fa-brands fa-github"></i></a>
                <a href="https://youtube.com/@nikegtag" target="_blank"><i class="fa-brands fa-youtube"></i></a>
                <a href="https://tiktok.com/@gnmath" target="_blank"><i class="fa-brands fa-tiktok"></i></a>
            </div>
        </main>

        <section class="card spotify-card">
            <div class="spotify-header">
                <div class="spotify-logo"><i class="fa-brands fa-spotify"></i></div>
                <div class="spotify-info">
                    <span class="spotify-status">Now Playing</span>
                    <span class="spotify-track">ARE WE STILL FRIENDS?</span>
                    <span class="spotify-artist">by tyler, the creator</span>
                </div>
            </div>

            <div class="music-controls">
                <button onclick="skipTime(-5)" title="Rewind 5s"><i class="fa-solid fa-backward-step"></i></button>
                <button id="playPauseBtn" onclick="togglePlay()" title="Play/Pause"><i class="fa-solid fa-pause"></i></button>
                <button onclick="skipTime(5)" title="Forward 5s"><i class="fa-solid fa-forward-step"></i></button>
            </div>
        </section>

        <section class="card work-card">
            <div class="card-header">
                <span class="section-title"><i class="fa-solid fa-code"></i> my work</span>
                <button class="discord-btn" onclick="copyDiscord()">Add @nikegtag <i class="fa-solid fa-arrow-right"></i></button>
            </div>
            <hr class="divider">
            <div class="work-grid">
                <a href="https://nikehub.org" class="work-item">
                    <div class="work-icon"><i class="fa-solid fa-wrench"></i></div>
                    <div class="work-info">
                        <span class="work-name">nikehub</span>
                        <span class="work-desc">the only unblocked game site you'll need...</span>
                    </div>
                </a>
                <a href="https://nikenetworkv3.b-cdn.net" class="work-item">
                    <i class="fa-solid fa-wifi"></i>
                    <div class="work-info">
                        <span class="work-name">nikenetwork proxy</span>
                        <span class="work-desc">unleash the true potential of your network...</span>
                    </div>
                </a>
            </div>
        </section>
    </div>

    <script>
        const audio = document.getElementById('bgMusic');
        const playPauseBtn = document.getElementById('playPauseBtn');

        function enterSite() {
            const overlay = document.getElementById('overlay');
            const video = document.getElementById('bgVideo');
            video.play();
            audio.play();
            audio.volume = 0.5;
            overlay.classList.add('fade-out');
        }

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                playPauseBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';
            } else {
                audio.pause();
                playPauseBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
            }
        }

        function skipTime(seconds) {
            audio.currentTime += seconds;
        }

        function copyDiscord() {
            const btn = document.querySelector('.discord-btn');
            navigator.clipboard.writeText("nikegtag");
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Copied! <i class="fa-solid fa-check"></i>';
            setTimeout(() => { btn.innerHTML = originalText; }, 2000);
        }

        // Security
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = e => {
            if (e.keyCode == 123) return false;
            if (e.ctrlKey && e.shiftKey && [73, 74, 67].includes(e.keyCode)) return false;
            if (e.ctrlKey && e.keyCode == 85) return false;
        };
    </script>
</body>

</html>
